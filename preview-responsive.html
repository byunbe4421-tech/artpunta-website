<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>반응형 미리보기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #16213e;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }

  header h1 {
    color: #e2e8f0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .url-bar {
    flex: 1;
    background: #0f3460;
    border: 1px solid #1a4a7a;
    border-radius: 6px;
    padding: 5px 12px;
    color: #94a3b8;
    font-size: 12px;
  }

  .previews {
    display: flex;
    gap: 16px;
    padding: 16px;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  .device-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .device-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
  }

  .device-label .size {
    color: #475569;
    font-size: 11px;
  }

  .device-label .icon {
    font-size: 15px;
  }

  .frame-outer {
    flex: 1;
    width: 100%;
    background: #0f172a;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #1e3a5f;
    position: relative;
  }

  .frame-outer.tablet {
    max-width: 768px;
    margin: 0 auto;
  }

  .frame-outer.mobile {
    max-width: 390px;
    margin: 0 auto;
  }

  .frame-bar {
    background: #1e293b;
    padding: 6px 10px;
    display: flex;
    gap: 5px;
    align-items: center;
    border-bottom: 1px solid #0f3460;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.r { background: #ef4444; }
  .dot.y { background: #eab308; }
  .dot.g { background: #22c55e; }

  .iframe-wrap {
    width: 100%;
    height: calc(100% - 28px);
    overflow: hidden;
    position: relative;
  }

  /* PC: iframe을 실제 크기로 렌더링 후 scale */
  .device-wrap.pc .iframe-wrap iframe {
    width: 1440px;
    height: 900px;
    border: none;
    transform-origin: top left;
  }

  /* Tablet */
  .device-wrap.tablet .iframe-wrap iframe {
    width: 768px;
    height: 1024px;
    border: none;
    transform-origin: top left;
  }

  /* Mobile */
  .device-wrap.mobile .iframe-wrap iframe {
    width: 390px;
    height: 844px;
    border: none;
    transform-origin: top left;
  }
</style>
</head>
<body>

<header>
  <h1>반응형 미리보기</h1>
  <div class="url-bar">localhost:5500/mptora52-education.html</div>
</header>

<div class="previews">

  <!-- PC -->
  <div class="device-wrap pc">
    <div class="device-label">
      <span class="icon">🖥</span> PC
      <span class="size">1440px</span>
    </div>
    <div class="frame-outer">
      <div class="frame-bar">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      </div>
      <div class="iframe-wrap" id="pc-wrap">
        <iframe src="mptora52-education.html" id="pc-frame"></iframe>
      </div>
    </div>
  </div>

  <!-- Tablet -->
  <div class="device-wrap tablet">
    <div class="device-label">
      <span class="icon">📱</span> 태블릿
      <span class="size">768px</span>
    </div>
    <div class="frame-outer tablet">
      <div class="frame-bar">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      </div>
      <div class="iframe-wrap" id="tablet-wrap">
        <iframe src="mptora52-education.html" id="tablet-frame"></iframe>
      </div>
    </div>
  </div>

  <!-- Mobile -->
  <div class="device-wrap mobile">
    <div class="device-label">
      <span class="icon">📱</span> 모바일
      <span class="size">390px</span>
    </div>
    <div class="frame-outer mobile">
      <div class="frame-bar">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      </div>
      <div class="iframe-wrap" id="mobile-wrap">
        <iframe src="mptora52-education.html" id="mobile-frame"></iframe>
      </div>
    </div>
  </div>

</div>

<script>
  function scaleFrames() {
    const devices = [
      { wrap: 'pc-wrap',     frame: 'pc-frame',     iw: 1440, ih: 900  },
      { wrap: 'tablet-wrap', frame: 'tablet-frame', iw: 768,  ih: 1024 },
      { wrap: 'mobile-wrap', frame: 'mobile-frame', iw: 390,  ih: 844  },
    ];

    devices.forEach(({ wrap, frame, iw, ih }) => {
      const wrapEl = document.getElementById(wrap);
      const frameEl = document.getElementById(frame);
      const w = wrapEl.offsetWidth;
      const h = wrapEl.offsetHeight;
      const scale = Math.min(w / iw, h / ih);
      frameEl.style.transform = `scale(${scale})`;
      frameEl.style.width = iw + 'px';
      frameEl.style.height = ih + 'px';
    });
  }

  scaleFrames();
  window.addEventListener('resize', scaleFrames);
</script>
</body>
</html>
